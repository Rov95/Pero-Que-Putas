services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: pero_que_putas
      POSTGRES_PASSWORD: pero_que_putas
      POSTGRES_DB: pero_que_putas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pero_que_putas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
